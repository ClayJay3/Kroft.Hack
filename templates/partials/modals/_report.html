<!-- REPORT MODAL -->
<div id="report-modal" class="hidden fixed inset-0 z-50 items-center justify-center p-6 bg-black/70 backdrop-blur-sm" onclick="if(event.target===this)closeReport()">
    <div class="bg-[#0a0c10] border border-[#1f222a] rounded-xl shadow-2xl w-full max-w-3xl max-h-[88vh] flex flex-col">
        <div class="flex items-center justify-between px-5 py-4 border-b border-[#1f222a]">
            <span id="report-title" class="text-sm font-semibold text-gray-100">Engagement Report</span>
            <div class="flex items-center gap-2">
                <button id="report-download" onclick="downloadReport()" class="hidden text-[11px] text-green-300 border border-green-500/30 rounded px-3 py-1.5 hover:bg-green-500/10">Download .md</button>
                <button onclick="closeReport()" class="text-gray-600 hover:text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
            </div>
        </div>
        <div id="report-body" class="overflow-y-auto custom-scrollbar p-5 text-sm leading-relaxed"></div>
    </div>
</div>
