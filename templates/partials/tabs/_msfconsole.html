        <!-- MSF CONSOLE -->
        <div id="msfconsole" class="tab-content hidden flex-col h-full overflow-hidden gap-4">
            <!-- Header bar -->
            <div class="flex items-center gap-3 flex-shrink-0">
                <div class="card-panel flex-1 flex flex-row items-center gap-3 px-4 py-3">
                    <div class="w-2 h-2 rounded-full bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.8)] flex-shrink-0"></div>
                    <span class="text-xs font-bold text-orange-400 uppercase tracking-widest flex-shrink-0">msfconsole</span>
                    <span id="msfc-status-text" class="text-[10px] font-mono text-gray-600 flex-shrink-0">Disconnected</span>
                    <div class="flex-1"></div>
                    <button onclick="msfcClear()" class="text-xs text-gray-600 hover:text-gray-400 transition-colors px-2 py-1 rounded border border-[#1f222a] hover:border-[#2a2f3a]">Clear</button>
                    <button onclick="msfcReconnect()" class="text-xs text-orange-600 hover:text-orange-400 transition-colors px-3 py-1 rounded border border-orange-900/30 hover:border-orange-500/30 flex items-center gap-1.5">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        Reconnect
                    </button>
                </div>
            </div>

            <!-- Terminal output -->
            <div class="card-panel flex-1 min-h-0 flex flex-col">
                <div class="card-header flex-shrink-0 justify-between border-b border-orange-900/20">
                    <div class="flex items-center gap-3">
                        <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                        <span class="card-title text-orange-400">Interactive Console</span>
                    </div>
                    <div class="flex items-center gap-2 text-[10px] font-mono text-gray-600">
                        <span id="msfc-busy-indicator" class="hidden items-center gap-1 text-orange-400">
                            <svg class="animate-spin w-3 h-3" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                            busy
                        </span>
                        <span class="text-gray-700">console id: </span><span id="msfc-console-id" class="text-gray-500">-</span>
                    </div>
                </div>
                <!-- Output area -->
                <div id="msfc-output" class="flex-1 overflow-y-auto p-4 custom-scrollbar font-mono text-xs leading-relaxed text-green-300 bg-[#020304] whitespace-pre-wrap break-words" style="word-break:break-all"></div>
                <!-- Input bar -->
                <div class="flex-shrink-0 border-t border-[#1f222a] p-3 flex gap-2 items-center bg-[#0a0c10]">
                    <span class="text-orange-500 font-mono text-xs font-bold flex-shrink-0" id="msfc-prompt">msf6 &gt;</span>
                    <input type="text" id="msfc-input"
                        class="flex-1 bg-[#020304] border border-[#1f222a] rounded-lg px-3 py-2 text-xs text-green-300 font-mono focus:outline-none focus:border-orange-500/50 focus:ring-1 focus:ring-orange-500/20 placeholder-gray-700 transition-all"
                        placeholder="Type a command and press Enter..."
                        onkeydown="msfcInputKeydown(event)"
                        autocomplete="off" spellcheck="false" autocorrect="off">
                    <button onclick="msfcSend()" class="flex-shrink-0 bg-orange-600/80 hover:bg-orange-500 text-white px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                        Send
                    </button>
                </div>
            </div>
        </div>
